<dialog #dialogRef class="modal" (close)="onClose()">
  <header class="modal-header">
    <h2 class="modal-title">
      {{ mode() === 'edit' ? 'Edytuj kontakt' : 'Dodaj kontakt' }}
    </h2>
    <button type="button" class="btn btn--icon" aria-label="Zamknij" (click)="onClose()">X</button>
  </header>

  @if (loadingContact()) {
    <div class="modal-body">
      <p class="state-text">Ładowanie…</p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="modal-body">
        @if (error()) {
          <div class="form-error">{{ error() }}</div>
        }

        <div class="row">
          <label class="field">
            <span class="field-label">Imię</span>
            <input type="text" formControlName="firstName" maxlength="100" />
            @if (form.controls.firstName.touched && form.controls.firstName.invalid) {
              <span class="field-error">Wymagane, maks. 100 znaków.</span>
            }
          </label>

          <label class="field">
            <span class="field-label">Nazwisko</span>
            <input type="text" formControlName="lastName" maxlength="100" />
            @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
              <span class="field-error">Wymagane, maks. 100 znaków.</span>
            }
          </label>
        </div>

        <label class="field">
          <span class="field-label">Email</span>
          <input type="email" formControlName="email" autocomplete="off" />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            @if (form.controls.email.errors?.['duplicate']) {
              <span class="field-error"> Kontakt z tym adresem email już istnieje. </span>
            } @else if (form.controls.email.errors?.['required']) {
              <span class="field-error">Email jest wymagany.</span>
            } @else {
              <span class="field-error">Nieprawidłowy format email.</span>
            }
          }
        </label>

        <label class="field">
          <span class="field-label">
            Hasło
            @if (mode() === 'edit') {
              <span class="field-hint">(zostaw puste, aby nie zmieniać)</span>
            }
          </span>
          <input type="password" formControlName="password" autocomplete="new-password" />
          @if (form.controls.password.touched && passwordErrors) {
            <span class="field-error">
              @if (passwordErrors['required']) {
                Hasło jest wymagane.
              } @else if (passwordErrors['minlength']) {
                {{ passwordErrors['minlength'] }}
              } @else if (passwordErrors['maxlength']) {
                {{ passwordErrors['maxlength'] }}
              } @else if (passwordErrors['uppercase']) {
                {{ passwordErrors['uppercase'] }}
              } @else if (passwordErrors['lowercase']) {
                {{ passwordErrors['lowercase'] }}
              } @else if (passwordErrors['digit']) {
                {{ passwordErrors['digit'] }}
              } @else if (passwordErrors['special']) {
                {{ passwordErrors['special'] }}
              }
            </span>
          }
        </label>

        <div class="row">
          <label class="field">
            <span class="field-label">Telefon</span>
            <input
              type="tel"
              formControlName="phoneNumber"
              maxlength="20"
              placeholder="+48123456789"
            />
            <span class="field-hint">Format międzynarodowy, np. +48123456789.</span>
            @if (form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid) {
              <span class="field-error">Wymagany, maks. 20 znaków.</span>
            }
          </label>

          <label class="field">
            <span class="field-label">Data urodzenia</span>
            <input type="date" formControlName="dateOfBirth" />
            @if (form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid) {
              <span class="field-error">Data urodzenia jest wymagana.</span>
            }
          </label>
        </div>

        <label class="field">
          <span class="field-label">Kategoria</span>
          <select formControlName="categoryId">
            <option value="" disabled>— wybierz —</option>
            @for (cat of categories(); track cat.id) {
              <option [value]="cat.id">{{ cat.name }}</option>
            }
          </select>
          @if (form.controls.categoryId.touched && form.controls.categoryId.invalid) {
            <span class="field-error">Kategoria jest wymagana.</span>
          }
        </label>

        @if (showSubcategorySelect) {
          <label class="field">
            <span class="field-label">Podkategoria</span>
            <select formControlName="subcategoryId">
              <option value="" disabled>— wybierz —</option>
              @for (sub of subcategories(); track sub.id) {
                <option [value]="sub.id">{{ sub.name }}</option>
              }
            </select>
            @if (form.controls.subcategoryId.touched && form.controls.subcategoryId.invalid) {
              <span class="field-error">Podkategoria jest wymagana.</span>
            }
          </label>
        }

        @if (showSubcategoryText) {
          <label class="field">
            <span class="field-label">Podkategoria (własna)</span>
            <input type="text" formControlName="subcategoryName" maxlength="100" />
            @if (form.controls.subcategoryName.touched && form.controls.subcategoryName.invalid) {
              <span class="field-error">Wymagana, maks. 100 znaków.</span>
            }
          </label>
        }
      </div>

      <footer class="modal-footer">
        <button type="button" class="btn btn--ghost" (click)="onClose()" [disabled]="submitting()">
          Anuluj
        </button>
        <button type="submit" class="btn btn--primary" [disabled]="submitting()">
          {{ submitting() ? 'Zapisywanie…' : 'Zapisz' }}
        </button>
      </footer>
    </form>
  }
</dialog>
