<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <h1>Zaloguj się</h1>

    <label class="field">
      <span class="field-label">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="email@example.com"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="field-error">
          @if (form.controls.email.errors?.['required']) {
            Email jest wymagany.
          } @else if (form.controls.email.errors?.['email']) {
            Niepoprawny format email.
          }
        </span>
      }
    </label>

    <label class="field">
      <span class="field-label">Hasło</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="field-error">Hasło jest wymagane.</span>
      }
    </label>

    @if (error()) {
      <div class="form-error">{{ error() }}</div>
    }

    <button
      type="submit"
      class="btn btn--primary"
      [disabled]="submitting()"
    >
      {{ submitting() ? 'Logowanie...' : 'Zaloguj' }}
    </button>

    <p class="auth-link">
      Nie masz konta?
      <a routerLink="/register">Zarejestruj się</a>
    </p>
  </form>
</div>
